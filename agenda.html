<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Pets</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="main-header">
        <nav>
            <h1 class="logo">PETZEN</h1>
            <a href="area_cliente.html" class="btn">Voltar</a>
            <a href="home.html" class="btn">Sair</a>
        </nav>
    </header>

    <main class="page-container">
        <div class="content-box">
            <div class="app">
                <nav class="top-nav">
                    <button class="btn active" onclick="showPage('agenda')">Agenda</button>
                    <button class="btn" onclick="showPage('novo')">Novo evento</button>
                    <button class="btn" onclick="showPage('pets')">Meus pets</button>
                </nav>

                <main class="main">
                    <!-- Página: Agenda -->
                    <div id="page-agenda" class="page active">
                        <h2 class="section-title">Próximos Eventos</h2>
                        <div id="upcoming-events"></div>
                        <hr>
                        <h2 class="section-title">Eventos Anteriores</h2>
                        <div id="past-events"></div>
                    </div>

                    <!-- Página: Novo Evento -->
                    <div id="page-novo" class="page">
                        <h2 class="section-title">Adicionar Novo Evento</h2>
                        <div class="form-group">
                            <label for="ev-pet">Pet</label>
                            <select id="ev-pet"></select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ev-data">Data</label>
                                <input type="date" id="ev-data">
                            </div>
                            <div class="form-group">
                                <label for="ev-hora">Hora</label>
                                <input type="time" id="ev-hora">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="ev-tipo">Tipo</label>
                            <select id="ev-tipo">
                                <option value="consulta">Consulta</option>
                                <option value="vacina">Vacina</option>
                                <option value="banho">Banho e Tosa</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ev-desc">Descrição</label>
                            <input type="text" id="ev-desc" placeholder="Ex: Consulta de rotina">
                        </div>
                        <div class="form-group">
                            <label for="ev-local">Local</label>
                            <input type="text" id="ev-local" placeholder="Ex: Clínica PETZEN">
                        </div>
                        <div class="form-group">
                            <label for="ev-obs">Observações</label>
                            <textarea id="ev-obs" rows="3"></textarea>
                        </div>
                        <button class="btn" onclick="addEvent()">Salvar Evento</button>
                    </div>

                    <!-- Página: Meus Pets -->
                    <div id="page-pets" class="page">
                        <h2 class="section-title">Adicionar Novo Pet</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="pet-nome">Nome</label>
                                <input type="text" id="pet-nome">
                            </div>
                            <div class="form-group">
                                <label for="pet-nasc">Nascimento</label>
                                <input type="date" id="pet-nasc">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="pet-especie">Espécie</label>
                                <select id="pet-especie">
                                    <option value="🐶">Cachorro</option>
                                    <option value="🐱">Gato</option>
                                    <option value="🐰">Coelho</option>
                                    <option value="🐦">Pássaro</option>
                                    <option value="🐹">Hamster</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="pet-raca">Raça</label>
                                <input type="text" id="pet-raca">
                            </div>
                        </div>
                        <button class="btn" onclick="addPet()">Adicionar Pet</button>
                        <hr>
                        <h2 class="section-title">Meus Pets</h2>
                        <div id="pets-grid" class="pets-grid-container"></div>
                    </div>
                </main>
            </div>
        </div>
    </main>

    <div class="success-toast" id="toast"></div>

    <script src="../assets/js/agenda-pet.js"></script>
</body>
</html>
